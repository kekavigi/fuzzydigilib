<html>
  <head>
    <script
      src="https://code.jquery.com/jquery-3.5.1.min.js"
      integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/1.10.22/css/jquery.dataTables.css"
    />

    <script
      type="text/javascript"
      charset="utf8"
      src="https://cdn.datatables.net/1.10.22/js/jquery.dataTables.js"
    ></script>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

  </head>

  <body>
    <div class="container">
    <br>
    <h1> Bukan Digital Library ITB</h1>
    <h3> Cara lain <em>browsing</em> katalog buku</h3>
    <p> Tinggal tulis dan dapatkan hasil real-time. </p>
    <br>
    
      <table id="table_id" class="table table-sm table-stripped">
        <thead>
          <tr>
            <th>date</th>
            <th>title</th>
            <th>keyword</th>
            <th>description</th>
            <th>creator</th>
            <th>nidn</th>
            <th>contributor</th>
            <th>fakultas</th>
            <th>prodi</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>
    <script>
      $(document).ready(function () {
        $("#table_id").DataTable({
          ajax: { url: "https://github.com/kekavigi/fuzzydigilib/blob/master/digilib.json?raw=true", dataSrc: "" },
          "lengthMenu": [[3, 5, 10, 25, 50, -1], [3, 5, 10, 25, 50, "All"]],
          columns: [
            { data: "date" }, //0
            { data: "title" },
            { data: "keyword" }, //2
            { data: "description" },
            { data: "creator" },//4
            { data: "nidn" },
            { data: "contributor" },//6
            { data: "fakultas" },
            { data: "prodi" },//8
          ],
          columnDefs: [
            {
              targets: [0],
              visible: false,
              searchable: false,
            },
              {
              targets: [5],
              visible: false,
              searchable: true,
            },
               {
              targets: [7],
              visible: false,
              searchable: true,
            },              {
              targets: [8],
              visible: false,
              searchable: true,
            },         
          ],
        });
      });
    </script>
    
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>

  </body>
</html>
